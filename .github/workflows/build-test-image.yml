name: Build Test Image

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: "direct" to download a qcow2 image from a URL, "ubuntu" to use an Ubuntu Noble cloud image'
        required: true
        type: choice
        default: direct
        options:
          - direct
          - ubuntu
      url:
        description: 'URL of the qcow2 image to download (only used when mode is "direct")'
        required: false
        type: string
      tag:
        description: 'Tag for the resulting image (e.g., alinux3-20251030)'
        required: false
        type: string
      ubuntu-tag:
        description: 'Tag for the Ubuntu image (only used when mode is "ubuntu")'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  # Target repository for test images
  IMAGE_NAME: ${{ github.repository_owner }}/cryptpilot-fde-test-image

jobs:
  build-test-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Direct mode: download qcow2 image from URL ---
      - name: Download qcow2 image (direct mode)
        if: inputs.mode == 'direct'
        run: |
          echo "Downloading image from: ${{ inputs.url }}"
          mkdir -p /tmp/qcow2-image
          wget -O /tmp/qcow2-image/test-image.qcow2 "${{ inputs.url }}"
          ls -lh /tmp/qcow2-image/test-image.qcow2

      # --- Ubuntu mode: prepare Ubuntu cloud image ---
      - name: Install dependencies (ubuntu mode)
        if: inputs.mode == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils sgdisk kmod
          # Load NBD kernel module for qemu-nbd
          sudo modprobe nbd max_part=16

      - name: Download Ubuntu Noble cloud image (ubuntu mode)
        if: inputs.mode == 'ubuntu'
        run: |
          mkdir -p /tmp/qcow2-image
          wget -O /tmp/qcow2-image/test-image.qcow2 \
            https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
          ls -lh /tmp/qcow2-image/test-image.qcow2

      - name: Set root password (ubuntu mode)
        if: inputs.mode == 'ubuntu'
        run: |
          # Connect via qemu-nbd to modify the image directly
          NBD_DEV=$(sudo qemu-nbd --connect=/dev/nbd0 --format=qcow2 /tmp/qcow2-image/test-image.qcow2 --show-format 2>/dev/null || sudo qemu-nbd --connect=/dev/nbd0 --format=qcow2 /tmp/qcow2-image/test-image.qcow2; echo /dev/nbd0)
          sudo qemu-nbd --show-devices /dev/nbd0
          sleep 2
          sudo partprobe /dev/nbd0 2>/dev/null || true
          sleep 1

          # Find and mount the root partition
          MOUNT_POINT=/tmp/img-root
          sudo mkdir -p $MOUNT_POINT
          ROOT_PART=$(sudo lsblk -lnpo NAME,PARTTYPENAME /dev/nbd0 2>/dev/null | grep -i linux | awk '{print $1}' | head -1)
          if [ -z "$ROOT_PART" ]; then
            # Fallback: try common partition names
            for p in /dev/nbd0p1 /dev/nbd0p2 /dev/nbd0p3; do
              if [ -e "$p" ] && sudo file -sL "$p" 2>/dev/null | grep -q ext4; then
                ROOT_PART="$p"
                break
              fi
            done
          fi
          echo "Mounting root partition: $ROOT_PART"
          sudo mount "$ROOT_PART" $MOUNT_POINT

          # Set root password and configure
          sudo chroot $MOUNT_POINT /bin/bash -c 'echo "root:cryptpilot" | chpasswd'
          sudo chroot $MOUNT_POINT /bin/bash -c 'echo "PermitRootLogin yes" > /etc/ssh/sshd_config.d/root-login.conf 2>/dev/null || true'

          sudo umount $MOUNT_POINT
          sudo qemu-nbd --disconnect /dev/nbd0 >/dev/null 2>&1 || true

      - name: Resize Ubuntu disk to 10G (ubuntu mode)
        if: inputs.mode == 'ubuntu'
        run: |
          qemu-img resize /tmp/qcow2-image/test-image.qcow2 10G

      - name: Expand GPT partition table (ubuntu mode)
        if: inputs.mode == 'ubuntu'
        run: |
          sudo qemu-nbd --connect=/dev/nbd0 --format=qcow2 /tmp/qcow2-image/test-image.qcow2
          sleep 2
          sudo partprobe /dev/nbd0 2>/dev/null || true
          sleep 1
          sudo sgdisk -e /dev/nbd0
          sudo qemu-nbd --disconnect /dev/nbd0 >/dev/null 2>&1 || true

      - name: Install dracut and systemd-boot (ubuntu mode)
        if: inputs.mode == 'ubuntu'
        run: |
          sudo qemu-nbd --connect=/dev/nbd0 --format=qcow2 /tmp/qcow2-image/test-image.qcow2
          sleep 2
          sudo partprobe /dev/nbd0 2>/dev/null || true
          sleep 1

          # Find and mount the root partition
          MOUNT_POINT=/tmp/img-root2
          sudo mkdir -p $MOUNT_POINT
          ROOT_PART=$(sudo lsblk -lnpo NAME,PARTTYPENAME /dev/nbd0 2>/dev/null | grep -i linux | awk '{print $1}' | head -1)
          if [ -z "$ROOT_PART" ]; then
            for p in /dev/nbd0p1 /dev/nbd0p2 /dev/nbd0p3; do
              if [ -e "$p" ] && sudo file -sL "$p" 2>/dev/null | grep -q ext4; then
                ROOT_PART="$p"
                break
              fi
            done
          fi
          echo "Mounting root partition: $ROOT_PART"
          sudo mount "$ROOT_PART" $MOUNT_POINT

          # Mount necessary virtual filesystems for chroot
          sudo mount --bind /dev $MOUNT_POINT/dev
          sudo mount --bind /proc $MOUNT_POINT/proc
          sudo mount --bind /sys $MOUNT_POINT/sys
          sudo mount --bind /run $MOUNT_POINT/run 2>/dev/null || true

          # Install packages
          sudo chroot $MOUNT_POINT /bin/bash -c 'apt-get update && apt-get install -y dracut dracut-core systemd-boot-efi'

          # Unmount in reverse order
          sudo umount $MOUNT_POINT/run 2>/dev/null || true
          sudo umount $MOUNT_POINT/sys 2>/dev/null || true
          sudo umount $MOUNT_POINT/proc 2>/dev/null || true
          sudo umount $MOUNT_POINT/dev 2>/dev/null || true
          sudo umount $MOUNT_POINT
          sudo qemu-nbd --disconnect /dev/nbd0 >/dev/null 2>&1 || true

      # --- Common: build container image ---
      - name: Copy Dockerfile
        run: |
          cp tests/test-image.Dockerfile /tmp/qcow2-image/Dockerfile

      - name: Set image tag
        id: set-tag
        run: |
          if [ "${{ inputs.mode }}" = "ubuntu" ]; then
            echo "tag=${{ inputs.ubuntu-tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push container image
        uses: docker/build-push-action@v5
        with:
          context: /tmp/qcow2-image
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.set-tag.outputs.tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Test image with qcow2 for cryptpilot-convert integration tests
            qcow2.source.mode=${{ inputs.mode }}
            qcow2.source.url=${{ inputs.url || '' }}

      - name: Output image reference
        run: |
          echo "Test image built and pushed:"
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.set-tag.outputs.tag }}"
