name: Run Tests

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - 'master'

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        distro: ["alibaba-cloud-linux-3-registry.cn-hangzhou.cr.aliyuncs.com/alinux3/alinux3:latest", "registry.openanolis.cn/openanolis/anolisos:23"]
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    container:
      image: ${{ matrix.distro }}
      volumes:
        - /run/udev/control:/run/udev/control
        - /dev:/dev
      options: --privileged --ipc=host
    steps:
      - name: Install dependencies
        run: |
          set -e
          set -x

          # Speed up package installation
          sed -i -E 's|https?://mirrors.openanolis.cn/anolis/|https://mirrors.aliyun.com/anolis/|g' /etc/yum.repos.d/*.repo
          sed -i -E 's|https?://mirrors.cloud.aliyuncs.com/|https://mirrors.aliyun.com/|g' /etc/yum.repos.d/*.repo
          sed -i 's/^max_parallel_downloads=.*/max_parallel_downloads=20/' /etc/yum.conf
          if ! grep -q "^max_parallel_downloads=" /etc/yum.conf; then
            sed -i '/^\[main\]$/a max_parallel_downloads=20' /etc/yum.conf
          fi

          # update packages
          yum update -y

          # install development tools
          yum install -y autoconf automake binutils bison flex gcc gcc-c++ gdb glibc-devel libtool make pkgconf pkgconf-m4 pkgconf-pkg-config rpm-build rpm-sign strace asciidoc byacc ctags diffstat elfutils-libelf-devel git intltool patchutils perl-Fedora-VSP perl-Sys-Syslog perl-generators pesign source-highlight systemtap valgrind valgrind-devel cmake expect rpmdevtools rpmlint perl clang python3

          # install rpmdevtools
          yum install -y git yum-utils

          # install runtime dependencies for tests (from cryptpilot.spec)
          # Note: skip coreutils as it conflicts with coreutils-single on anolisos:23
          yum install -y device-mapper kmod systemd systemd-udev lvm2 util-linux veritysetup dosfstools xfsprogs e2fsprogs fuse3 fuse3-libs

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Install build dependencies
        run: yum-builddep -y --skip-unavailable --define 'with_rustup 1' ./cryptpilot.spec

      - name: Run test script from repo
        run: make run-test

  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.85.0
      - name: Verify interop fixture is up to date
        run: |
          (cd verity-core && python3 make_testfiles.py)
          HASH=$(cargo run -q -p cryptpilot-verity -- format verity-core/testfiles --hash-output - --label env=prod --force)
          diff verity-core/testfiles/cryptpilot-verity.metadata.fb verity-go/metadata/testdata/rust.metadata.fb \
            || { echo "ERROR: interop fixture is stale. Run verity-go/metadata/gen_fixture.sh to regenerate."; exit 1; }
          EXPECTED_HASH=$(cat verity-go/metadata/testdata/rust.metadata.fb.hash | tr -d '[:space:]')
          if [ "$HASH" != "$EXPECTED_HASH" ]; then
            echo "ERROR: root hash mismatch"
            echo "  expected: $EXPECTED_HASH"
            echo "  got:      $HASH"
            exit 1
          fi
          echo "Interop fixture and root hash are up to date"
      - name: Run Go tests
        run: |
          cd verity-go
          go test -race -v ./...
      - name: Check FlatBuffers schemas in sync
        run: make check-fbs

  test-convert-ubuntu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bootloader: [grub, uki]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libguestfs-tools \
            qemu-utils \
            lvm2 \
            cryptsetup-bin \
            e2fsprogs \
            dosfstools \
            kmod \
            dmsetup \
            fuse3 \
            docker.io

      - name: Pull Ubuntu test image
        run: |
          sudo docker pull ghcr.io/openanolis/cryptpilot-fde-test-image:noble-dracut-20260518

      - name: Extract qcow2 from container
        run: |
          CONTAINER_ID=$(sudo docker create ghcr.io/openanolis/cryptpilot-fde-test-image:noble-dracut-20260518)
          sudo docker cp "$CONTAINER_ID":/image.qcow2 ./test-image.qcow2
          sudo docker rm "$CONTAINER_ID"

      - name: Download latest cryptpilot-fde-guest .deb
        run: |
          LATEST_RELEASE=$(gh api repos/openanolis/cryptpilot/releases/latest --jq '.tag_name')
          echo "Latest release: $LATEST_RELEASE"
          gh api repos/openanolis/cryptpilot/releases/latest \
            --jq '.assets[] | select(.name | endswith(".deb")) | .browser_download_url' \
            | head -n1 \
            | xargs -I{} curl -fSL -o cryptpilot-fde-guest.deb {}

      - name: Build cryptpilot-fde-host
        run: |
          cargo build --bin cryptpilot-fde-host --release

      - name: Run conversion test
        run: |
          sudo LIBGUESTFS_BACKEND=direct ./tests/test-convert.sh \
            --distro ubuntu \
            --deb cryptpilot-fde-guest.deb \
            --bootloader ${{ matrix.bootloader }} \
            --rootfs-enc \
            --delta-location ram \
            --input ./test-image.qcow2
