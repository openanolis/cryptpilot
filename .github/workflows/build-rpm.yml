name: Build RPM Package

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - 'master'

jobs:
  create-tarball:
    runs-on: ubuntu-latest
    outputs:
      PRE_RELEASE: ${{ steps.check-pre-release.outputs.PRE_RELEASE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Check pre-release
        id: check-pre-release
        run: |
          tag="${GITHUB_REF#refs/*/}"
          echo "tag=tag"
          if [[ ${tag} == *alpha* || ${tag} == *beta* ]]
          then
              prerelease=true
          else
              prerelease=false
          fi
          echo "prerelease=$prerelease"
          echo "PRE_RELEASE=$prerelease" >> $GITHUB_OUTPUT

      - uses: dtolnay/rust-toolchain@1.82.0

      - name: Create tarball
        run: make create-tarball

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          if-no-files-found: error
          path: /tmp/cryptpilot-*.tar.gz

  build:
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    needs: create-tarball
    outputs:
      rpm_name_al8: ${{ steps.extract-rpm-name.outputs.rpm_name_al8 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Download tarball
        uses: actions/download-artifact@v8
        with:
          name: source-tarball
          path: ./

      - name: Prepare Alinux3 buildspec and export version info
        id: extract-rpm-name
        run: |
          GITHUB_RELEASE="${{ github.ref_name || 'no_tag' }}"
          VERSION=$(grep -m1 '^Version:' cryptpilot.spec | awk '{print $2}')
          RELEASE=$(grep -m1 '^%define release_num' cryptpilot.spec | awk '{print $3}')
          
          echo "Using GITHUB_RELEASE: $GITHUB_RELEASE"
          echo "Using VERSION: $VERSION"
          echo "Using RELEASE: $RELEASE"

          # Create buildspec for release
          export GITHUB_RELEASE VERSION RELEASE
          envsubst '$GITHUB_RELEASE $VERSION $RELEASE' \
            < rpm/alinux3/cryptpilot.al8.${{ matrix.arch }}.buildspec.yaml.template \
            > ./cryptpilot-${VERSION}-${RELEASE}.al8.${{ matrix.arch }}.buildspec.yaml

          # Copy buildspec for local build
          # Install yq
          YQ_ARCH=${{ matrix.arch == 'aarch64' && 'arm64' || 'amd64' }}
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_${YQ_ARCH}
          sudo chmod +x /usr/local/bin/yq

          cp ./cryptpilot-${VERSION}-${RELEASE}.al8.${{ matrix.arch }}.buildspec.yaml rpm/alinux3/cryptpilot.al8.${{ matrix.arch }}.buildspec.yaml
          # Replace URL with local path for local build
          yq -i ".inputs.vendored-source.url = \"file://${GITHUB_WORKSPACE}/cryptpilot-${VERSION}-vendored-source.tar.gz\"" rpm/alinux3/cryptpilot.al8.${{ matrix.arch }}.buildspec.yaml

          # Export rpm_name for use in other steps and jobs
          echo "rpm_name_al8=cryptpilot-${VERSION}-${RELEASE}.al8" >> $GITHUB_OUTPUT

      - name: Upload build input artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-input-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            ./cryptpilot-*-vendored-source.tar.gz
            ./cryptpilot-*.al8.${{ matrix.arch }}.buildspec.yaml

      - name: Build RPM package
        uses: 1570005763/GuanFu@v1
        with:
          spec_path: rpm/alinux3/cryptpilot.al8.${{ matrix.arch }}.buildspec.yaml

      - name: Upload build output artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            /tmp/rpmbuild/SRPMS/cryptpilot-*.al8.src.rpm
            /tmp/rpmbuild/RPMS/${{ matrix.arch }}/cryptpilot-fde-*.al8.${{ matrix.arch }}.rpm
            /tmp/rpmbuild/RPMS/${{ matrix.arch }}/cryptpilot-crypt-*.al8.${{ matrix.arch }}.rpm
            /tmp/rpmbuild/RPMS/${{ matrix.arch }}/cryptpilot-verity-*.al8.${{ matrix.arch }}.rpm

  test:
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        distro: ["alibaba-cloud-linux-3-registry.cn-hangzhou.cr.aliyuncs.com/alinux3/alinux3:latest", "registry.openanolis.cn/openanolis/anolisos:23"]
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    needs: build
    container:
      image: ${{ matrix.distro }}
    steps:
      - name: Install dependencies
        run: |
          set -e
          set -x

          # Speed up package installation
          sed -i -E 's|https?://mirrors.openanolis.cn/anolis/|https://mirrors.aliyun.com/anolis/|g' /etc/yum.repos.d/*.repo
          sed -i -E 's|https?://mirrors.cloud.aliyuncs.com/|https://mirrors.aliyun.com/|g' /etc/yum.repos.d/*.repo
          sed -i 's/^max_parallel_downloads=.*/max_parallel_downloads=20/' /etc/yum.conf
          if ! grep -q "^max_parallel_downloads=" /etc/yum.conf; then
            sed -i '/^\[main\]$/a max_parallel_downloads=20' /etc/yum.conf
          fi

          # update packages
          yum update -y

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-output-${{ matrix.arch }}
          path: ./rpm-packages/
          merge-multiple: false

      - name: Install RPM packages
        run: |
          set -e
          set -x

          # test rpm package install
          yum install -y ./rpm-packages/RPMS/*/cryptpilot-fde-[0-9]*.rpm ./rpm-packages/RPMS/*/cryptpilot-crypt-[0-9]*.rpm ./rpm-packages/RPMS/*/cryptpilot-verity-[0-9]*.rpm
          cryptpilot-fde --version
          cryptpilot-crypt --version
          cryptpilot-verity --version

  # Integration tests for cryptpilot-convert (12 parallel jobs via matrix)
  test-convert:
    strategy:
      fail-fast: false
      matrix:
        bootloader: [uki, grub]
        rootfs_enc: [enc, noenc]
        delta_location: [ram, disk, disk-persist]
    runs-on: ubuntu-latest
    needs: build
    env:
      TEST_IMAGE_TAG: "alinux3-20251030"  # Update this when test image changes
    steps:
      - name: Load NBD kernel module
        run: |
          echo "Loading nbd module on host..."
          sudo modprobe nbd max_part=16
          lsmod | grep nbd

      - name: Pull test image from ghcr.io
        run: |
          TEST_IMAGE="ghcr.io/${{ github.repository_owner }}/cryptpilot-fde-test-image:${{ env.TEST_IMAGE_TAG }}"
          docker pull "$TEST_IMAGE" 
          echo "TEST_IMAGE=$TEST_IMAGE" >> $GITHUB_ENV

      - name: Extract qcow2 image from container
        run: |
          echo "Extracting qcow2 image from container..."
          mkdir -p ${{ github.workspace }}/test-images
          docker create --name temp-extract ${{ env.TEST_IMAGE }} /bin/true
          docker cp temp-extract:/image.qcow2 ${{ github.workspace }}/test-images/test-image.qcow2
          docker rm temp-extract
          ls -lh ${{ github.workspace }}/test-images/test-image.qcow2
          echo "Removing pulled test image to reclaim disk space..."
          docker rmi "$TEST_IMAGE"

      - name: Check available disk and memory
        run: df -h && echo "---" && free -h

      - name: Start test container
        run: |
          docker run -d \
            --name test-container \
            --privileged \
            --ipc=host \
            -v /dev:/dev \
            -v /run/udev/control:/run/udev/control \
            -v ${{ github.workspace }}:/workspace \
            alibaba-cloud-linux-3-registry.cn-hangzhou.cr.aliyuncs.com/alinux3/alinux3:latest \
            sleep infinity

      - name: Setup container environment
        run: |
          docker exec test-container bash -c "
            set -e
            sed -i -E 's|https?://mirrors.cloud.aliyuncs.com/|https://mirrors.aliyun.com/|g' /etc/yum.repos.d/*.repo
            yum update -y
            yum install -y git make
          "

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-output-x86_64
          path: ./rpm-packages/
          merge-multiple: false

      - name: Install RPM packages
        id: install-rpm
        run: |
          # Find the RPM path and export it (host path)
          RPM_PATH=$(ls ./rpm-packages/RPMS/*/cryptpilot-fde-[0-9]*.rpm | head -1)
          echo "Found RPM: ${RPM_PATH}"
          # Convert to container path (workspace is mounted at /workspace)
          RPM_PATH_IN_CONTAINER="/workspace/${RPM_PATH#./}"
          echo "RPM path in container: ${RPM_PATH_IN_CONTAINER}"
          # Export both host path and container path
          echo "cryptpilot_fde_rpm=${RPM_PATH}" >> $GITHUB_OUTPUT
          echo "cryptpilot_fde_rpm_container=${RPM_PATH_IN_CONTAINER}" >> $GITHUB_OUTPUT
          docker exec test-container bash -c "
            yum install -y ${RPM_PATH_IN_CONTAINER}
            cryptpilot-fde --version
          "

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'
          path: repo

      - name: Run convert test
        run: |
          docker exec -w /workspace/repo test-container bash -c "
            make run-convert-test-case BOOTLOADER=${{ matrix.bootloader }} ROOTFS_ENC=${{ matrix.rootfs_enc }} DELTA_LOCATION=${{ matrix.delta_location }} INPUT_IMAGE=/workspace/test-images/test-image.qcow2 CRYPTPILOT_FDE_RPM=${{ steps.install-rpm.outputs.cryptpilot_fde_rpm_container }}
          "

      - name: Cleanup
        if: always()
        run: |
          docker rm -f test-container || true
          rm -rf ${{ github.workspace }}/test-images

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - create-tarball
      - build
      - test
      - test-convert
    strategy:
      max-parallel: 1
      matrix:
        include:
          - arch: x86_64
          - arch: aarch64
    permissions:
      actions: read
      contents: write
      id-token: write
    uses: 1570005763/GuanFu/.github/workflows/release.yml@v1
    with:
      input_artifact: build-input-${{ matrix.arch }}
      output_artifact: build-output-${{ matrix.arch }}
      release_slsa_provenance: true
      provenance_name: "${{ needs.build.outputs.rpm_name_al8 }}.${{ matrix.arch }}.intoto.jsonl"
      rpm_detail_provenance: true
      upload_provenance_to_rekor: true
      release_tag_name: "${{ github.ref_name }}"
      prerelease: ${{ needs.create-tarball.outputs.PRE_RELEASE == 'true' }}

  update-release-notes:
    name: Update GitHub Release Notes
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: generate-notes
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          echo "Current tag: $CURRENT_TAG"
          
          # Extract version number from current tag (e.g., v0.5.0-alpha -> v0.5.0)
          CURRENT_VERSION=$(echo "$CURRENT_TAG" | grep -oE '^v[0-9]+\.[0-9]+\.[0-9]+')
          echo "Current version: $CURRENT_VERSION"
          
          # Get all stable tags sorted by version
          STABLE_TAGS=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$')
          echo "Stable tags:"
          echo "$STABLE_TAGS" | head -5
          
          # Check if the stable version of current tag exists
          if echo "$STABLE_TAGS" | grep -q "^${CURRENT_VERSION}$"; then
            echo "Found stable version $CURRENT_VERSION, finding previous tag"
            # Use the stable version as reference, find the one before it
            PREV_TAG=$(echo "$STABLE_TAGS" | grep -A1 "^${CURRENT_VERSION}$" | tail -n1)
          else
            echo "Stable version not found, using most recent stable tag"
            # Current tag is pre-release, find the most recent stable tag
            PREV_TAG=$(echo "$STABLE_TAGS" | head -1)
          fi
          
          # Fallback: if still no prev tag, use the most recent stable tag
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_VERSION" ]; then
            echo "Fallback: using most recent stable tag"
            PREV_TAG=$(echo "$STABLE_TAGS" | head -1)
          fi
          echo "Previous tag: $PREV_TAG"
          
          # Generate changelog with commit hashes
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..${CURRENT_TAG}" --pretty=format:"- (%h) %s" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- (%h) %s" --no-merges -20)
          fi
          
          # Write to file
          echo "## What's Changed" > release_notes.md
          echo "" >> release_notes.md
          echo "$CHANGELOG" >> release_notes.md
          echo "" >> release_notes.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG}" >> release_notes.md
          
          cat release_notes.md

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          append_body: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

