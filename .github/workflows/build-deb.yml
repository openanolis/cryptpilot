name: Build DEB Package

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - 'master'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ubuntu-latest
            deb_arch: amd64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            deb_arch: arm64
    runs-on: ${{ matrix.runner }}
    container:
      image: ubuntu:24.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Install git for checkout
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y git

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Install build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y \
            build-essential \
            debhelper \
            devscripts \
            curl \
            cmake \
            protobuf-compiler \
            libcryptsetup-dev \
            libdevmapper-dev \
            libfuse3-dev \
            clang \
            pkg-config

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.85.0
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build DEB packages
        run: |
          source "$HOME/.cargo/env"
          make deb-build
          mkdir -p $GITHUB_WORKSPACE/deb-packages
          cp ../*.deb $GITHUB_WORKSPACE/deb-packages/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            ./deb-packages/cryptpilot-fde-host_*.deb
            ./deb-packages/cryptpilot-fde-guest_*.deb
            ./deb-packages/cryptpilot-crypt_*.deb
            ./deb-packages/cryptpilot-verity_*.deb

  test:
    strategy:
      fail-fast: false
      matrix:
        distro: ["ubuntu:24.04"]
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    needs: build
    container:
      image: ${{ matrix.distro }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: deb-packages-${{ matrix.arch }}
          path: ./deb-packages/
          merge-multiple: false

      - name: Install DEB packages
        run: |
          set -e
          set -x

          export DEBIAN_FRONTEND=noninteractive
          apt-get update

          # Install DEB packages with automatic dependency resolution
          apt-get install -y ./deb-packages/*.deb

      - name: Verify installation
        run: |
          set -e
          set -x

          # Check binary versions
          cryptpilot-fde-host --version
          cryptpilot-fde-guest --version
          cryptpilot-crypt --version
          cryptpilot-verity --version

          # Check that binaries exist
          test -x /usr/bin/cryptpilot-fde-host
          test -x /usr/bin/cryptpilot-fde-guest
          test -x /usr/bin/cryptpilot-crypt
          test -x /usr/bin/cryptpilot-verity
          test -x /usr/bin/cryptpilot-convert
          test -x /usr/bin/cryptpilot-enhance

          # Check configuration files
          test -f /etc/cryptpilot/global.toml.template
          test -f /etc/cryptpilot/fde.toml.template
          test -d /etc/cryptpilot/volumes
          test -f /etc/cryptpilot/volumes/otp.toml.template
          test -f /etc/cryptpilot/volumes/kbs.toml.template

          # Check dracut module
          test -d /usr/lib/dracut/modules.d/91cryptpilot
          test -f /usr/lib/dracut/modules.d/91cryptpilot/module-setup.sh

          # Check systemd service
          test -f /lib/systemd/system/cryptpilot.service

          # Check udev rules
          test -f /usr/lib/udev/rules.d/12-cryptpilot-hide-intermediate-devices.rules

          echo "All verification checks passed!"

  test-convert:
    runs-on: ubuntu-latest
    needs: [build, test]
    strategy:
      fail-fast: false
      matrix:
        bootloader: [grub, uki]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # GH runner already has Docker installed; install only additional deps
          # Include grub packages for cryptpilot-convert UKI support
          # Include libguestfs-tools for EFI partition restoration
          # Include passt for libguestfs network access
          sudo apt-get install -y \
            qemu-utils \
            cryptsetup-bin \
            e2fsprogs \
            dosfstools \
            kmod \
            fuse3 \
            lvm2 \
            grub-common \
            grub-efi-amd64-bin \
            sbsigntool \
            libguestfs-tools \
            passt

      - name: Pull Ubuntu test image
        run: |
          sudo docker pull ghcr.io/openanolis/cryptpilot-fde-test-image:noble-dracut-20260518

      - name: Extract qcow2 from container
        run: |
          CONTAINER_ID=$(sudo docker create ghcr.io/openanolis/cryptpilot-fde-test-image:noble-dracut-20260518 echo ok)
          sudo docker cp "$CONTAINER_ID":/image.qcow2 "$GITHUB_WORKSPACE/test-image.qcow2"
          sudo docker rm "$CONTAINER_ID"

      - name: Download DEB packages
        uses: actions/download-artifact@v8
        with:
          name: deb-packages-x86_64
          path: ./deb-packages/

      - name: Run conversion test
        run: |
          DEB_PKG=$(ls "$GITHUB_WORKSPACE"/deb-packages/cryptpilot-fde-guest_*.deb | head -1)
          sudo LIBGUESTFS_BACKEND=direct ./tests/test-convert.sh \
            --distro ubuntu \
            --package "$DEB_PKG" \
            --bootloader ${{ matrix.bootloader }} \
            --rootfs-enc \
            --delta-location ram \
            --input "$GITHUB_WORKSPACE/test-image.qcow2"

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts/
          merge-multiple: false

      - name: Reorganize artifacts
        run: |
          mkdir -p ./release-packages/
          # Copy DEB packages from architecture-specific artifacts
          find ./artifacts/deb-packages-*/ -type f -name '*.deb' -exec cp {} ./release-packages/ \;

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: ./release-packages/*.deb
